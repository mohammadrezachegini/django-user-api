# postgres.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: django-api

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: django-api
type: Opaque
stringData:
  POSTGRES_DB: django_api
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: changeme-use-vault-later

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: django-api
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        workload: apps
      containers:
      - name: postgres
        image: postgres:15
        envFrom:
        - secretRef:
            name: postgres-secret
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      resources:
        requests:
          storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: django-api
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
apiVersion: v1
kind: Secret
metadata:
  name: django-secret
  namespace: django-api
type: Opaque
stringData:
  DJANGO_SECRET_KEY: change-this-to-a-real-random-secret-key
  DB_NAME: django_api
  DB_USER: postgres
  DB_PASSWORD: changeme-use-vault-later
  DB_HOST: postgres
  DB_PORT: "5432"
  DEBUG: "True"
  ALLOWED_HOSTS: "django-user-api.rezaops.com,localhost,*"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-api
  namespace: django-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-api
  template:
    metadata:
      labels:
        app: django-api
    spec:
      nodeSelector:
        workload: apps
      initContainers:
      - name: migrate
        image: 10.0.0.206:5000/django-api:latest
        command: ["python", "manage.py", "migrate", "--noinput"]
        envFrom:
        - secretRef:
            name: django-secret
      containers:
      - name: django-api
        image: 10.0.0.206:5000/django-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: django-secret
        readinessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: django-api
  namespace: django-api
spec:
  selector:
    app: django-api
  ports:
  - port: 8000
    targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: django-api-ingress
  namespace: django-api
spec:
  ingressClassName: nginx
  rules:
  - host: django-user-api.rezaops.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: django-api
            port:
              number: 8000